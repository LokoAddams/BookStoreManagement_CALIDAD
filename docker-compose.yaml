version: '3.8'

services:
  postgres_db:
    image: postgres:alpine 
    container_name: Calidad_Booking
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: admin 
      POSTGRES_DB: postgres
    ports:
      - "5432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data 
      - ./Scripts:/docker-entrypoint-initdb.d/

volumes:
  pgdata: